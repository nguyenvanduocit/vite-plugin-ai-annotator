name: Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Semver bump'
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # OIDC token exchange for npm Trusted Publisher — no NPM_TOKEN needed.
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so npm version's commit+tag has proper context.
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Build BEFORE bumping the version. If build fails we don't want a
      # half-released tag pointing at broken code.
      - name: Build
        run: bun run build

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          NEW_VERSION=$(npm version ${{ inputs.version_type }} -m "chore(release): %s")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      # Pushing with the default GITHUB_TOKEN does NOT re-trigger workflows,
      # so the tag push from here will not re-run npm-publish.yml. We publish
      # in the same job below to avoid that gap. Local users who push tags
      # manually with their own credentials WILL trigger npm-publish.yml.
      - name: Push commit + tag
        run: git push --follow-tags

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ steps.bump.outputs.version }}" --generate-notes
